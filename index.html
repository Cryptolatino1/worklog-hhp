<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Work Log">
<title>Work Log - Highlands House Polinger</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F3F4F6;min-height:100vh;padding-bottom:60px}
.app{max-width:480px;margin:0 auto;padding:16px}
.header{background:linear-gradient(160deg,#0a0a0f 0%,#12121f 50%,#0d0d1a 100%);border-radius:20px;padding:20px 24px;margin-bottom:20px;color:#fff;border:1px solid rgba(124,58,237,0.35);box-shadow:0 0 32px rgba(100,60,220,0.18)}
.header-title{font-size:22px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(90deg,#a78bfa,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-sub{font-size:11px;opacity:.55;margin-top:3px;letter-spacing:.5px;color:#fff;-webkit-text-fill-color:#fff}
.header-period{background:rgba(124,58,237,0.2);border:1px solid rgba(124,58,237,0.4);border-radius:10px;padding:4px 10px;font-size:11px;font-weight:600;color:#c4b5fd}
.stat-grid{display:flex;gap:8px;margin-top:16px}
.stat-box{flex:1;background:rgba(167,139,250,0.12);border:1px solid rgba(167,139,250,0.2);border-radius:12px;padding:8px 4px;text-align:center}
.stat-lbl{font-size:9px;opacity:.6;letter-spacing:.5px;color:#fff;-webkit-text-fill-color:#fff}
.stat-val{font-size:14px;font-weight:700;margin-top:2px;color:#e9d5ff;-webkit-text-fill-color:#e9d5ff}
.tabs{display:flex;background:#fff;border-radius:14px;padding:4px;margin-bottom:20px;gap:2px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.tab{flex:1;padding:10px 4px;border:none;border-radius:11px;cursor:pointer;font-size:13px;font-weight:400;background:transparent;color:#6B7280;transition:all .2s;-webkit-appearance:none}
.tab.on{font-weight:600;background:#f5f3ff;color:#7C3AED;box-shadow:0 1px 6px rgba(0,0,0,0.1)}
.card{background:#fff;border-radius:18px;padding:18px;margin-bottom:14px;border:1px solid #E5E7EB}
.card-title{font-size:13px;font-weight:600;color:#374151;margin-bottom:14px}
.lbl{font-size:12px;color:#6B7280;display:block;margin-bottom:5px}
.inp{width:100%;padding:10px 12px;border-radius:12px;border:1.5px solid #E5E7EB;font-size:15px;color:#111827;outline:none;background:#fff;-webkit-appearance:none;font-family:inherit}
.inp:focus{border-color:#7C3AED}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.mg{margin-bottom:14px}
textarea.inp{resize:none;font-family:inherit}
.badge{border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;display:inline-block;margin:2px}
.bg{background:#D1FAE5;color:#059669}
.bo{background:#FFEDD5;color:#EA580C}
.ba{background:#EDE9FE;color:#7C3AED}
.bp{background:#DBEAFE;color:#2563EB}
.btn{width:100%;padding:14px;border-radius:16px;border:none;cursor:pointer;font-weight:700;font-size:16px;margin-top:4px;-webkit-appearance:none;font-family:inherit}
.btn-main{background:linear-gradient(135deg,#7C3AED 0%,#2563EB 100%);color:#fff}
.btn-outline{padding:11px;border-radius:13px;border:1.5px solid #7C3AED;background:#EDE9FE;color:#7C3AED;font-weight:600;font-size:14px;margin-top:0}
.btn-copy{background:linear-gradient(135deg,#7C3AED 0%,#2563EB 100%);color:#fff;padding:11px;border-radius:13px;font-size:14px;margin-top:10px}
.btn-rec{width:100%;padding:12px;border-radius:14px;border:none;cursor:pointer;font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-appearance:none;font-family:inherit}
.rec-idle{background:#EDE9FE;color:#7C3AED}
.rec-on{background:#FEE2E2;color:#DB2777}
.add-photo{width:100%;padding:12px;border-radius:14px;border:2px dashed #D1D5DB;background:#FAFAFA;cursor:pointer;color:#6B7280;font-size:14px;-webkit-appearance:none;font-family:inherit}
.pgrid{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.pwrap{position:relative}
.pthumb{width:72px;height:72px;object-fit:cover;border-radius:10px;cursor:pointer;display:block}
.pdel{position:absolute;top:-5px;right:-5px;width:20px;height:20px;border-radius:50%;background:#DB2777;color:#fff;border:none;cursor:pointer;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1}
.ecard{background:#fff;border-radius:18px;padding:16px;margin-bottom:12px;border:1px solid #E5E7EB}
.edate{font-weight:600;font-size:14px;color:#111827}
.etime{font-size:12px;color:#6B7280;margin-top:2px}
.etotal{font-size:18px;font-weight:700}
.enote{font-size:13px;color:#4B5563;margin-top:8px;line-height:1.5}
.bdgs{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.pbtn{padding:10px 14px;border-radius:12px;border:1.5px solid #E5E7EB;cursor:pointer;background:#FAFAFA;color:#374151;font-size:13px;text-align:left;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;width:100%;-webkit-appearance:none;font-family:inherit}
.pbtn.on{border-color:#7C3AED;background:#EDE9FE;color:#7C3AED;font-weight:600}
.cbadge{font-size:10px;background:#7C3AED;color:#fff;border-radius:20px;padding:2px 8px}
.scards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.scard{border-radius:16px;padding:14px 16px}
.bar-wrap{height:10px;background:#F3F4F6;border-radius:99px;overflow:hidden;display:flex;margin-top:4px}
.legend{display:flex;gap:14px;margin-top:10px}
.ldot{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:middle}
.rpre{background:#F9FAFB;border-radius:12px;padding:14px;font-size:11px;color:#374151;white-space:pre-wrap;line-height:1.7;border:1px solid #E5E7EB;margin-bottom:10px;overflow-x:auto;font-family:monospace}
.saved{text-align:center;color:#059669;font-weight:600;font-size:14px;padding:10px}
.view{display:none}
.view.on{display:block}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;vertical-align:middle}
.proc{font-size:12px;color:#7C3AED;text-align:center;margin-top:8px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;z-index:9999}
.modal img{max-width:92vw;max-height:88vh;border-radius:16px;object-fit:contain}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
      <div>
        <div class="header-title">Work Log</div>
        <div class="header-sub">HIGHLANDS HOUSE POLINGER</div>
      </div>
      <div class="header-period" id="hdr-period">-</div>
    </div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-lbl">TOTAL</div><div class="stat-val" id="hdr-total">0h</div></div>
      <div class="stat-box"><div class="stat-lbl">REGULAR</div><div class="stat-val" id="hdr-reg">0h</div></div>
      <div class="stat-box"><div class="stat-lbl">OVERTIME</div><div class="stat-val" id="hdr-ot">0h</div></div>
      <div class="stat-box"><div class="stat-lbl">DIAS</div><div class="stat-val" id="hdr-days">0</div></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" id="t-registro" onclick="go('registro')">Registrar</button>
    <button class="tab" id="t-historial" onclick="go('historial')">Historial</button>
    <button class="tab" id="t-reporte" onclick="go('reporte')">Reporte</button>
  </div>
  <div id="v-registro" class="view on">
    <div class="card">
      <div class="card-title">Registro por voz</div>
      <button id="btn-rec" class="btn-rec rec-idle" onclick="toggleRec()">
        <span class="dot" id="rdot" style="background:#7C3AED"></span>
        <span id="rlbl">Grabar audio</span>
      </button>
      <div id="rproc" class="proc" style="display:none">Procesando con IA...</div>
      <audio id="rplayer" controls style="width:100%;height:40px;border-radius:8px;margin-top:10px;display:none"></audio>
    </div>
    <div class="card">
      <div class="card-title">Detalles del dia</div>
      <div class="mg"><label class="lbl">Fecha</label><input type="date" id="f-date" class="inp"></div>
      <div class="row2">
        <div><label class="lbl">Hora inicio</label><input type="time" id="f-start" class="inp" value="08:00" oninput="prevH()"></div>
        <div><label class="lbl">Hora fin</label><input type="time" id="f-end" class="inp" value="17:00" oninput="prevH()"></div>
      </div>
      <div id="hprev" style="display:none;flex-wrap:wrap;gap:6px;margin-bottom:14px"></div>
      <div class="mg"><label class="lbl">Nota del dia</label><textarea id="f-note" class="inp" rows="3" placeholder="Que hiciste hoy?"></textarea></div>
    </div>
    <div class="card">
      <div class="card-title">Evidencia fotografica</div>
      <button class="add-photo" onclick="document.getElementById('finput').click()">+ Agregar fotos</button>
      <input type="file" id="finput" accept="image/*" multiple style="display:none" onchange="addPhotos(this)">
      <div class="pgrid" id="pgrid"></div>
    </div>
    <button class="btn btn-main" onclick="saveEntry()">Guardar registro</button>
    <div id="smsg" class="saved" style="display:none">Registro guardado</div>
  </div>
  <div id="v-historial" class="view"><div id="hlist"></div></div>
  <div id="v-reporte" class="view">
    <div class="card"><div class="card-title">Periodo bi-weekly</div><div id="plist"></div></div>
    <div class="scards" id="rcards"></div>
    <div class="card" id="rbars" style="display:none">
      <div class="card-title">Desglose por dia</div>
      <div id="rbars-c"></div>
      <div class="legend">
        <span><span class="ldot" style="background:#059669"></span><span style="font-size:11px;color:#6B7280">Regular</span></span>
        <span><span class="ldot" style="background:#EA580C"></span><span style="font-size:11px;color:#6B7280">Overtime</span></span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Reporte para tu jefe</div>
      <div style="font-size:12px;color:#6B7280;margin-bottom:12px">Resumen listo para copiar y enviar</div>
      <button class="btn btn-outline" onclick="toggleRep()">Ver reporte</button>
      <div id="repbox" style="display:none;margin-top:12px">
        <pre class="rpre" id="reptxt"></pre>
        <button class="btn btn-copy" onclick="copyRep()">Copiar reporte</button>
      </div>
    </div>
  </div>
</div>
<div id="modal" class="modal" style="display:none" onclick="document.getElementById('modal').style.display='none'">
  <img id="mimg" src="" alt="">
</div>
<script>
var SD="2026-03-23";
var DC=["#7C3AED","#2563EB","#059669","#EA580C","#DB2777","#D97706"];
var entries=JSON.parse(localStorage.getItem("wl2")||"null")||[
  {id:1,date:"2026-03-23",start:"08:00",end:"16:00",note:"Primer dia de trabajo",photos:[],au:null},
  {id:2,date:"2026-03-24",start:"08:00",end:"16:00",note:"",photos:[],au:null},
  {id:3,date:"2026-03-25",start:"08:00",end:"16:00",note:"",photos:[],au:null},
  {id:4,date:"2026-03-26",start:"08:00",end:"16:30",note:"",photos:[],au:null},
  {id:5,date:"2026-03-27",start:"08:00",end:"16:00",note:"",photos:[],au:null}
];
var fPhotos=[],curAudio=null,mrec=null,achunks=[],isRec=false,aPidx=null;
function ls(){localStorage.setItem("wl2",JSON.stringify(entries));}
function tm(t){if(!t)return 0;var p=t.split(":");return parseInt(p[0])*60+parseInt(p[1]);}
function ch(s,e){var tot=tm(e)-tm(s);if(tot<=0)return{t:0,r:0,o:0};return{t:tot,r:Math.min(tot,480),o:Math.max(0,tot-480)};}
function fh(m){var h=Math.floor(m/60),mn=m%60;return mn>0?h+"h "+mn+"m":h+"h";}
function fd(d){return new Date(d+"T12:00:00").toLocaleDateString("es-MX",{weekday:"short",month:"short",day:"numeric"});}
function td(){return new Date().toISOString().slice(0,10);}
function getPeriods(){var s=new Date(SD+"T12:00:00"),ps=[];for(var i=0;i<6;i++){var a=new Date(s);a.setDate(s.getDate()+i*14);var b=new Date(a);b.setDate(a.getDate()+13);ps.push({lbl:a.toLocaleDateString("es-MX",{month:"short",day:"numeric"})+" - "+b.toLocaleDateString("es-MX",{month:"short",day:"numeric"}),s:a.toISOString().slice(0,10),e:b.toISOString().slice(0,10)});}return ps;}
function cpIdx(ps){var t=td();var i=ps.findIndex(function(p){return t>=p.s&&t<=p.e;});return i>=0?i:0;}
function go(tab){document.querySelectorAll(".view").forEach(function(v){v.classList.remove("on");});document.querySelectorAll(".tab").forEach(function(b){b.classList.remove("on");});document.getElementById("v-"+tab).classList.add("on");document.getElementById("t-"+tab).classList.add("on");if(tab==="historial")renderH();if(tab==="reporte")renderR();}
function prevH(){var s=document.getElementById("f-start").value,e=document.getElementById("f-end").value;var h=ch(s,e),el=document.getElementById("hprev");if(!h.t){el.style.display="none";return;}el.style.display="flex";el.innerHTML='<span class="badge bg">'+fh(h.r)+' regular</span>'+(h.o>0?'<span class="badge bo">'+fh(h.o)+' overtime</span>':"");}
function addPhotos(inp){Array.from(inp.files).forEach(function(f){var r=new FileReader();r.onload=function(ev){fPhotos.push(ev.target.result);renderPG();};r.readAsDataURL(f);});}
function renderPG(){document.getElementById("pgrid").innerHTML=fPhotos.map(function(p,i){return '<div class="pwrap"><img src="'+p+'" class="pthumb" onclick="openM(\''+i+'\')">'+'<button class="pdel" onclick="delP('+i+')">x</button></div>';}).join("");}
function delP(i){fPhotos.splice(i,1);renderPG();}
function openM(i){var src=typeof i==="number"?fPhotos[i]:i;document.getElementById("mimg").src=src;document.getElementById("modal").style.display="flex";}
function toggleRec(){if(isRec){mrec.stop();isRec=false;return;}navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){achunks=[];mrec=new MediaRecorder(stream);mrec.ondataavailable=function(e){achunks.push(e.data);};mrec.onstop=function(){stream.getTracks().forEach(function(t){t.stop();});procAudio();};mrec.start();isRec=true;document.getElementById("btn-rec").className="btn-rec rec-on";document.getElementById("rdot").style.background="#DB2777";document.getElementById("rlbl").textContent="Detener grabacion";}).catch(function(){alert("No se pudo acceder al microfono.");});}
function procAudio(){document.getElementById("btn-rec").className="btn-rec rec-idle";document.getElementById("rdot").style.background="#7C3AED";document.getElementById("rlbl").textContent="Grabar audio";var blob=new Blob(achunks,{type:"audio/webm"});curAudio=URL.createObjectURL(blob);var pl=document.getElementById("rplayer");pl.src=curAudio;pl.style.display="block";document.getElementById("rproc").style.display="block";fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,messages:[{role:"user",content:[{type:"text",text:"Extrae: hora_inicio,hora_fin,nota. JSON: {hora_inicio,hora_fin,nota}"}]}]})}).then(function(r){return r.json();}).then(function(data){try{var txt=data.content&&data.content[0]?data.content[0].text:"{}";var p=JSON.parse(txt.replace(/```json|```/g,"").trim());if(p.hora_inicio)document.getElementById("f-start").value=p.hora_inicio;if(p.hora_fin)document.getElementById("f-end").value=p.hora_fin;if(p.nota)document.getElementById("f-note").value=p.nota;prevH();}catch(e){}document.getElementById("rproc").style.display="none";}).catch(function(){document.getElementById("rproc").style.display="none";});}
function saveEntry(){var date=document.getElementById("f-date").value;var start=document.getElementById("f-start").value;var end=document.getElementById("f-end").value;var note=document.getElementById("f-note").value;var h=ch(start,end);if(!h.t){alert("Verifica las horas");return;}var entry={id:Date.now(),date:date,start:start,end:end,note:note,photos:fPhotos.slice(),au:curAudio};entries=([entry].concat(entries.filter(function(e){return e.date!==date;}))).sort(function(a,b){return b.date.localeCompare(a.date);});ls();updHdr();document.getElementById("smsg").style.display="block";setTimeout(function(){document.getElementById("smsg").style.display="none";document.getElementById("f-date").value=td();document.getElementById("f-start").value="08:00";document.getElementById("f-end").value="17:00";document.getElementById("f-note").value="";document.getElementById("rplayer").style.display="none";document.getElementById("hprev").style.display="none";fPhotos=[];curAudio=null;renderPG();},1500);}
function renderH(){var el=document.getElementById("hlist");if(!entries.length){el.innerHTML='<div style="text-align:center;color:#9CA3AF;padding:40px 0">Sin registros aun</div>';return;}el.innerHTML=entries.map(function(e,i){var h=ch(e.start,e.end),c=DC[i%DC.length];var photos=e.photos||[];return '<div class="ecard" style="border-left:4px solid '+c+'">'+'<div style="display:flex;justify-content:space-between;align-items:flex-start">'+'<div><div class="edate">'+fd(e.date)+'</div><div class="etime">'+e.start+' - '+e.end+'</div></div>'+'<div class="etotal" style="color:'+c+'">'+fh(h.t)+'</div></div>'+'<div class="bdgs">'+'<span class="badge bg">'+fh(h.r)+' regular</span>'+( h.o>0?'<span class="badge bo">'+fh(h.o)+' overtime</span>':"")+(e.au?'<span class="badge ba">audio</span>':"")+( photos.length?'<span class="badge bp">'+photos.length+' foto'+(photos.length>1?"s":"")+'</span>':"")+'</div>'+(e.note?'<div class="enote">'+e.note+'</div>':"")+( photos.length?'<div class="pgrid">'+photos.map(function(p){return'<img src="'+p+'" style="width:60px;height:60px;object-fit:cover;border-radius:8px;cursor:pointer" onclick="openM(\''+p+'\')">';}).join("")+'</div>':"")+( e.au?'<audio controls src="'+e.au+'" style="width:100%;height:36px;border-radius:8px;margin-top:10px"></audio>':"")+'</div>';}).join("");}
function renderR(){var ps=getPeriods(),ci=cpIdx(ps);if(aPidx===null)aPidx=ci;var p=ps[aPidx];var pe=entries.filter(function(e){return e.date>=p.s&&e.date<=p.e;});var tot=pe.reduce(function(s,e){return s+ch(e.start,e.end).t;},0);var reg=pe.reduce(function(s,e){return s+ch(e.start,e.end).r;},0);var ot=pe.reduce(function(s,e){return s+ch(e.start,e.end).o;},0);document.getElementById("plist").innerHTML=ps.map(function(pp,i){return '<button class="pbtn'+(i===aPidx?" on":"")+'" onclick="selP('+i+')">'+'<span>'+pp.lbl+'</span>'+(i===ci?'<span class="cbadge">Actual</span>':"")+'</button>';}).join("");var sd=[["Total",fh(tot),"#7C3AED","#EDE9FE"],["Regular",fh(reg),"#059669","#D1FAE5"],["Overtime",fh(ot),"#EA580C","#FFEDD5"],["Dias",pe.length,"#2563EB","#DBEAFE"]];document.getElementById("rcards").innerHTML=sd.map(function(x){return '<div class="scard" style="background:'+x[3]+'"><div style="font-size:12px;font-weight:500;color:'+x[2]+';opacity:.8">'+x[0]+'</div><div style="font-size:24px;font-weight:700;color:'+x[2]+';margin-top:4px">'+x[1]+'</div></div>';}).join("");if(pe.length){document.getElementById("rbars").style.display="block";document.getElementById("rbars-c").innerHTML=pe.map(function(e,i){var h=ch(e.start,e.end),mx=600;var rw=Math.round(h.r/mx*100),ow=Math.round(h.o/mx*100);return '<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:#374151;font-weight:500">'+fd(e.date)+'</span><span style="color:'+DC[i%DC.length]+';font-weight:700">'+fh(h.t)+'</span></div><div class="bar-wrap"><div style="width:'+rw+'%;background:#059669;border-radius:'+(ow===0?"99px":"99px 0 0 99px")+'"></div>'+(ow>0?'<div style="width:'+ow+'%;background:#EA580C;border-radius:0 99px 99px 0"></div>':"")+'</div></div>';}).join("");}else{document.getElementById("rbars").style.display="none";}}
function selP(i){aPidx=i;renderR();document.getElementById("repbox").style.display="none";}
function toggleRep(){var b=document.getElementById("repbox");if(b.style.display==="none"||!b.style.display){b.style.display="block";document.getElementById("reptxt").textContent=genRep();}else{b.style.display="none";}}
function genRep(){var ps=getPeriods(),p=ps[aPidx!==null?aPidx:cpIdx(ps)];var pe=entries.filter(function(e){return e.date>=p.s&&e.date<=p.e;});var tot=pe.reduce(function(s,e){return s+ch(e.start,e.end).t;},0);var reg=pe.reduce(function(s,e){return s+ch(e.start,e.end).r;},0);var ot=pe.reduce(function(s,e){return s+ch(e.start,e.end).o;},0);var lines=["REPORTE DE HORAS - HIGHLANDS HOUSE POLINGER","Periodo: "+p.lbl,"","RESUMEN","Total horas:     "+fh(tot),"Horas regulares: "+fh(reg),"Overtime:        "+fh(ot),"Dias trabajados: "+pe.length,"","DETALLE POR DIA"];pe.forEach(function(e){var h=ch(e.start,e.end);lines.push(fd(e.date)+"  "+e.start+"-"+e.end+"  Total:"+fh(h.t)+"  Reg:"+fh(h.r)+(h.o>0?"  OT:"+fh(h.o):"")+(e.note?"  | "+e.note:""));});lines.push("","Generado: "+new Date().toLocaleString("es-MX"));return lines.join("\n");}
function copyRep(){var txt=genRep();if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){alert("Reporte copiado!");}).catch(function(){fallCopy(txt);});}else{fallCopy(txt);}}
function fallCopy(txt){var ta=document.createElement("textarea");ta.value=txt;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand("copy");alert("Reporte copiado!");}catch(e){}document.body.removeChild(ta);}
function updHdr(){var ps=getPeriods(),p=ps[cpIdx(ps)];document.getElementById("hdr-period").textContent=p.lbl;var pe=entries.filter(function(e){return e.date>=p.s&&e.date<=p.e;});document.getElementById("hdr-total").textContent=fh(pe.reduce(function(s,e){return s+ch(e.start,e.end).t;},0));document.getElementById("hdr-reg").textContent=fh(pe.reduce(function(s,e){return s+ch(e.start,e.end).r;},0));document.getElementById("hdr-ot").textContent=fh(pe.reduce(function(s,e){return s+ch(e.start,e.end).o;},0));document.getElementById("hdr-days").textContent=pe.length;}
document.getElementById("f-date").value=td();
updHdr();
</script>
